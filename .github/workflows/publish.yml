name: Publish to PyPI

# This workflow triggers automatically whenever you publish a new "Release" on GitHub
on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    
    # These permissions are absolutely strictly required for Trusted Publishing to work
    permissions:
      id-token: write  
      contents: read   

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install build dependencies
      run: python -m pip install --upgrade build

    - name: Build the package
      run: python -m build

    - name: Publish package to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1